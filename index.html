<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Lifts">
<meta name="theme-color" content="#0c0c0e">
<meta name="color-scheme" content="dark">
<title>Big Lifts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c0c0e;--s1:#141416;--s2:#1c1c20;--s3:#242428;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2f2f7;--text2:#8e8e93;--text3:#48484a;
  --green:#30d158;--red:#ff453a;--blue:#0a84ff;--yellow:#ffd60a;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,8px);
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
#app{position:fixed;top:0;left:0;right:0;bottom:0;height:100%;height:100dvh;display:flex;flex-direction:column;}
#screens{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform;background:var(--bg);}
.screen.active{transform:translateX(0);}
.screen.behind{transform:translateX(-28%);}
.screen-header{padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.screen-title{font-size:17px;font-weight:600;letter-spacing:-.3px;flex:1;}
.screen-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--s2);border:none;color:var(--text2);cursor:pointer;flex-shrink:0;}
.screen-action{padding:6px 14px;border-radius:8px;background:var(--s2);border:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.screen-action.primary{background:var(--text);color:var(--bg);}
.screen-body{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot) + 16px);}
.screen-body::-webkit-scrollbar{display:none;}
#nav{display:flex;background:var(--s1);border-top:1px solid var(--border);padding-bottom:max(var(--safe-bot),8px);flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--text3);cursor:pointer;transition:color .15s;}
.nav-item.active{color:var(--text);}
.nav-icon{width:22px;height:22px;}
.nav-label{font-size:10px;font-weight:500;}
.card{background:var(--s1);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:0;}
.list-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--s2);}
.li-main{flex:1;min-width:0;}
.li-title{font-size:15px;font-weight:500;}
.li-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.li-right{color:var(--text3);font-size:13px;font-weight:500;flex-shrink:0;}
.btn{display:flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%;}
.btn:active{opacity:.7;transform:scale(.985);}
.btn-p{background:var(--text);color:var(--bg);}
.btn-s{background:var(--s2);color:var(--text);}
.btn-g{background:rgba(255,255,255,0.07);border:1px solid var(--border2);color:var(--text);}
.btn-sm{padding:7px 16px;font-size:13px;border-radius:8px;}
.input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit;}
.input:focus{border-color:var(--border2);}
.input::placeholder{color:var(--text3);}
.label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.field{margin-bottom:14px;}
.section{padding:12px 16px 0;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.8px;}
.sec-action{font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;font-weight:500;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.b-push{background:rgba(255,159,10,.15);color:#ff9f0a;}
.b-pull{background:rgba(10,132,255,.15);color:#0a84ff;}
.b-legs{background:rgba(48,209,88,.15);color:#30d158;}
.b-rest{background:rgba(142,142,147,.15);color:#8e8e93;}
.b-full{background:rgba(191,90,242,.15);color:#bf5af2;}
.b-cardio{background:rgba(255,214,10,.15);color:#ffd60a;}
.stat-row{display:flex;gap:8px;}
.stat-box{flex:1;background:var(--s1);border-radius:10px;border:1px solid var(--border);padding:10px 12px;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500;}
.xp-bar{background:var(--s3);border-radius:3px;height:3px;overflow:hidden;margin-top:6px;}
.xp-fill{height:100%;background:linear-gradient(90deg,#ff6600,#ffd700);border-radius:3px;transition:width .5s;}
.wo-table{width:100%;border-collapse:collapse;}
.wo-table th{padding:7px 8px 7px 0;text-align:left;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.wo-table th:not(:first-child){text-align:center;}
.wo-table td{padding:10px 8px 10px 0;border-bottom:1px solid var(--border);vertical-align:top;}
.wo-table td:not(:first-child){text-align:center;font-size:14px;font-weight:500;color:var(--text2);}
.wo-table tr:last-child td{border-bottom:none;}
.ex-name{font-size:14px;font-weight:500;}
.ex-note{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}
.set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-num{width:28px;height:28px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;}
.set-num.done{background:rgba(48,209,88,.15);color:var(--green);}
.set-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;font-size:14px;font-weight:500;text-align:center;color:var(--text);outline:none;min-width:0;}
.set-input:focus{border-color:var(--border2);}
.set-btn{padding:8px 14px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;}
.set-btn.done{background:rgba(48,209,88,.1);border-color:rgba(48,209,88,.3);color:var(--green);}
#coach-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
#coach-messages::-webkit-scrollbar{display:none;}
.msg-user{align-self:flex-end;background:var(--s3);border-radius:14px 14px 4px 14px;padding:10px 14px;font-size:14px;max-width:88%;line-height:1.5;}
.msg-ai{align-self:flex-start;max-width:92%;}
.msg-ai-lbl{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;}
.msg-ai-body{background:var(--s2);border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:14px;line-height:1.6;}
.msg-ai-body h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;color:var(--text2);}
.msg-ai-body p{margin-bottom:8px;}
.msg-ai-body p:last-child{margin-bottom:0;}
.msg-ai-body strong{font-weight:700;}
.msg-ai-body ul,.msg-ai-body ol{padding-left:18px;margin:4px 0 8px;}
.msg-ai-body li{margin-bottom:4px;line-height:1.5;}
.coach-bar{display:flex;gap:8px;padding:10px 16px;padding-bottom:calc(10px + var(--safe-bot));border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.coach-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:22px;padding:10px 16px;font-size:15px;color:var(--text);outline:none;font-family:inherit;resize:none;max-height:100px;overflow-y:auto;}
.coach-input:focus{border-color:var(--border2);}
.coach-send{width:38px;height:38px;border-radius:50%;background:var(--text);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 20px;scrollbar-width:none;flex-shrink:0;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;}
.mode-tabs{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mode-tab{flex:1;padding:7px;border-radius:8px;background:transparent;border:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;}
.mode-tab.active{background:var(--s2);color:var(--text);}
.typing{display:flex;gap:4px;align-items:center;padding:12px 14px;background:var(--s2);border-radius:14px 14px 14px 4px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}
.day-row{border-bottom:1px solid var(--border);}
.day-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;}
.day-name{font-size:15px;font-weight:600;}
.day-focus{font-size:12px;color:var(--text2);margin-top:2px;}
.day-chevron{color:var(--text3);font-size:18px;transition:transform .2s;}
.day-row.open .day-chevron{transform:rotate(90deg);}
.day-body{display:none;padding:0 20px 16px;}
.day-row.open .day-body{display:block;}
.rest-bar{display:none;padding:10px 20px;background:rgba(12,12,14,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);text-align:center;position:sticky;top:0;z-index:10;flex-shrink:0;}
.rest-bar.show{display:block;}
.rest-time{font-size:34px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.rest-presets{display:flex;gap:6px;justify-content:center;margin-top:6px;}
.rest-pre{padding:4px 12px;border-radius:6px;background:var(--s2);border:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;}
.wo-hd{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.wo-finish{padding:7px 18px;border-radius:8px;background:var(--green);color:#000;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.wo-footer{padding:10px 16px;padding-bottom:calc(10px + var(--safe-bot));border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.wo-finish-large{width:100%;padding:15px;border-radius:12px;background:var(--green);color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;}
.modal-ov.show{display:flex;}
.modal{background:var(--s1);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-height:88vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--s3);margin:0 auto 20px;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;}
.rating-row{display:flex;gap:4px;}
.r-btn{flex:1;padding:8px 0;border-radius:7px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;}
.r-btn.sel{background:var(--s3);border-color:var(--border2);color:var(--text);}
#toast{position:fixed;bottom:calc(var(--safe-bot) + 78px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:all .2s;z-index:500;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:60px 24px;color:var(--text2);}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:14px;line-height:1.5;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes splashPulse{0%,100%{opacity:.25;}50%{opacity:.9;}}
@keyframes splashCharIn{0%{opacity:0;transform:scale(0.25) translateY(40px);}60%{transform:scale(1.08) translateY(-6px);}80%{transform:scale(0.96) translateY(2px);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes splashTextIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes splashGlow{0%,100%{opacity:.2;transform:scale(.85);}50%{opacity:.55;transform:scale(1.1);}}
@keyframes lvlGlow{0%{opacity:0;transform:scale(.5);}35%{opacity:1;transform:scale(1.05);}100%{opacity:.6;transform:scale(1.18);}}
@keyframes lvlRank{0%{text-shadow:0 0 0 rgba(255,215,0,0);transform:scale(1);}35%{text-shadow:0 0 22px rgba(255,215,0,.85);transform:scale(1.04);}100%{text-shadow:0 0 8px rgba(255,215,0,.3);transform:scale(1);}}
#lvlup{position:fixed;inset:0;z-index:9000;pointer-events:none;display:flex;align-items:center;justify-content:center;transition:opacity .4s;}
#lvlup .lg{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.5) 0%,rgba(255,140,0,.16) 42%,transparent 70%);animation:lvlGlow .9s ease-out forwards;}
#lvlup .lt{text-align:center;position:relative;}
#lvlup .lk{font-size:12px;font-weight:700;letter-spacing:3px;color:#ffd700;}
#lvlup .lr{font-size:30px;font-weight:900;letter-spacing:1px;color:var(--text);margin-top:4px;animation:lvlRank .9s ease-out forwards;}
@keyframes xpFill{from{width:0;}to{width:var(--xp-target);}}
#splash{transition:opacity .55s ease;}
/* Macro / nutrition */
.macro-bar-wrap{margin-bottom:10px;}
.macro-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px;}
.macro-track{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.macro-fill{height:100%;border-radius:3px;transition:width .4s ease;}
/* Water drops */
.water-drops{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.drop{font-size:20px;opacity:.18;transition:opacity .2s;}
.drop.filled{opacity:1;}
/* Scanner overlay */
#scanner-overlay{display:none;position:fixed;inset:0;z-index:8000;background:#000;flex-direction:column;align-items:center;justify-content:center;}
#scanner-video{width:100%;max-width:420px;border-radius:10px;}
.scan-frame{position:absolute;width:72%;max-width:300px;height:80px;border:2px solid var(--yellow);border-radius:8px;pointer-events:none;box-shadow:0 0 0 2000px rgba(0,0,0,0.55);}
/* Food results */
.food-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.food-item:active{background:var(--s2);}
.food-macros{font-size:11px;color:var(--text3);margin-top:3px;}
/* Measurement rows */
.meas-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);}
.meas-row:last-child{border-bottom:none;}
.fade-up{animation:fadeUp .2s ease;}
.pr-row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid var(--border);}
.pr-row:last-child{border-bottom:none;}
.pr-name{flex:1;font-size:15px;font-weight:500;}
.pr-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.pr-unit{font-size:12px;color:var(--text2);margin-left:3px;}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ach-tile{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.ach-tile.done{border-color:rgba(255,255,255,0.15);}
.ach-icon{margin-bottom:5px;height:26px;display:flex;align-items:center;justify-content:center;}
.ach-icon svg{width:25px;height:25px;}
.ach-name{font-size:10px;font-weight:700;letter-spacing:.3px;line-height:1.3;color:var(--text);}
.ach-desc{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.3;}
.type-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.type-bar:last-child{border-bottom:none;}
.today-hero{background:var(--s1);border-bottom:1px solid var(--border);padding-bottom:16px;}
.hero-info{padding:0 16px;}
.hero-name{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.hero-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.hero-stats{display:flex;gap:6px;padding:10px 16px 0;}
.hero-stat{flex:1;text-align:center;}
.hero-stat-val{font-size:18px;font-weight:700;letter-spacing:-.3px;font-variant-numeric:tabular-nums;}
.hero-stat-lbl{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500;}
.hero-xp{padding:10px 16px 0;}
.hero-xp-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;}
</style>
</head>
<body>
<div id="splash" onclick="dismissSplash()" style="position:fixed;inset:0;background:#0c0c0e;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:10px;">
    <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,165,0,.28) 0%,rgba(255,80,0,.12) 45%,transparent 70%);animation:splashGlow 2.2s ease-in-out infinite;"></div>
    <div id="splash-char" style="position:relative;z-index:1;animation:splashCharIn .75s cubic-bezier(.17,.67,.38,1.3) forwards;opacity:0;"></div>
  </div>
  <div id="splash-lvl" style="font-size:11px;font-weight:700;letter-spacing:2px;color:var(--yellow);opacity:0;margin-bottom:10px;animation:splashTextIn .5s ease .6s forwards;"></div>
  <div id="splash-title" style="font-size:28px;font-weight:900;letter-spacing:3px;color:#f2f2f7;opacity:0;animation:splashTextIn .5s ease .75s forwards;">BIG LIFTS</div>
  <div style="font-size:10px;color:#48484a;margin-top:4px;letter-spacing:3px;opacity:0;animation:splashTextIn .5s ease .9s forwards;">TRAINING</div>
  <div style="margin-top:22px;width:160px;opacity:0;animation:splashTextIn .4s ease 1.05s forwards;">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:5px;"><span id="splash-xp-lbl"></span><span id="splash-xp-pct"></span></div>
    <div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
      <div id="splash-xpbar" style="height:100%;width:0;background:linear-gradient(90deg,#ff6600,#ffd700);border-radius:2px;transition:width 1s ease .2s;"></div>
    </div>
  </div>
</div>
<div id="app">
  <div id="screens">
    <div class="screen active" id="s-today">
      <div class="screen-body" id="b-today"></div>
    </div>
    <div class="screen" id="s-train">
      <div class="screen-header">
        <div class="screen-title">Train</div>
        <button class="screen-action" onclick="push('coach');renderCoach()">Coach</button>
        <button class="screen-action" onclick="openNewWorkoutModal()">+ New</button>
      </div>
      <div class="screen-body" id="b-train"></div>
    </div>
    <div class="screen" id="s-coach">
      <div class="screen-header" style="border-bottom:none;padding-bottom:8px;">
        <button class="screen-back" onclick="pop()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="screen-title">Coach</div>

<script>
// STATE
const DB='blt_v2',CK='blt_v2_chat';
function def(){return{name:'Bryce',xp:0,level:1,streak:0,lastLog:null,workouts:[],log:[],prs:{},program:null,checkins:[],apiKey:'',mode:'train',unlocked:[],
  meals:[],macroGoals:{cals:2500,protein:180,carbs:300,fat:80},
  water:{date:'',oz:0},waterGoal:64,
  measurements:[],lastBackup:0};}
let S=(()=>{const hydrate=raw=>{const d=def(),p=JSON.parse(raw),s=Object.assign({},d,p);Object.keys(d).forEach(k=>{if(s[k]===undefined||s[k]===null&&d[k]!==null)s[k]=d[k];});return s;};
  try{const r=localStorage.getItem(DB);if(r)return hydrate(r);}catch(e){}
  try{const b=localStorage.getItem(DB+'_bk');if(b)return hydrate(b);}catch(e){}
  return def();})();
let CH=(()=>{try{const r=localStorage.getItem(CK);if(r)return JSON.parse(r);}catch(e){}return[];})();
let _saveWarned=false;
function save(){
  let okMain=true;
  try{const d=JSON.stringify(S);localStorage.setItem(DB,d);localStorage.setItem(DB+'_bk',d);IDB.save(d);}catch(e){okMain=false;}
  try{if(typeof AW!=='undefined'&&AW)localStorage.setItem('blt_aw',JSON.stringify(AW));}catch(e){}
  try{localStorage.setItem(CK,JSON.stringify(CH.slice(-80)));}catch(e){}
  // Surface a write failure (e.g. storage full / blocked) instead of losing data silently.
  if(!okMain){if(!_saveWarned){_saveWarned=true;try{toast('Save failed — storage may be full. Back up your data now.');}catch(e){}}}
  else _saveWarned=false;
}
['pagehide','beforeunload'].forEach(e=>window.addEventListener(e,save));
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')save();});
setInterval(save,15000);
// IDB
const IDB={db:null,
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('BLV2',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('d',{keyPath:'k'});r.onsuccess=e=>{this.db=e.target.result;res();};r.onerror=rej;});},
  async save(data){if(!this.db)await this.open().catch(()=>{});if(!this.db)return;try{const tx=this.db.transaction('d','readwrite');tx.objectStore('d').put({k:'m',v:data,ts:Date.now()});}catch(e){}},
  async load(){if(!this.db)await this.open().catch(()=>{});if(!this.db)return null;return new Promise(res=>{try{const tx=this.db.transaction('d','readonly'),r=tx.objectStore('d').get('m');r.onsuccess=()=>res(r.result?.v||null);r.onerror=()=>res(null);}catch(e){res(null);}});}
};
// XP — 20 defined levels, extrapolates beyond. Curve tuned so ~100 XP/workout
// reaches L5 in ~2wks, L10 in ~2mo, L20 (max defined) in ~1.5yrs of 4x/week.
const LVL=[0,100,250,450,700,1000,1400,1900,2500,3300,4300,5500,7000,8800,11000,13600,16700,20400,24800,30000];
function xpForLvl(l){const idx=l-1;return idx<LVL.length?LVL[idx]:Math.round(LVL[LVL.length-1]*Math.pow(1.35,idx-(LVL.length-1)));}
function awardXP(n){
  const prevLvl=S.level;
  S.xp+=n;
  let lv=1;for(let i=1;;i++){if(S.xp>=xpForLvl(i+1))lv=i+1;else break;}
  S.level=lv;
  if(lv>prevLvl)setTimeout(goldPulse,150);
  checkAchievements();save();
}
function xpPct(){const c=xpForLvl(S.level),nx=xpForLvl(S.level+1);return Math.min(1,(S.xp-c)/(nx-c));}
function checkStreak(){
  const t=new Date().toLocaleDateString(),y=new Date(Date.now()-86400000).toLocaleDateString();
  if(S.lastLog===y)S.streak++;else if(S.lastLog!==t)S.streak=1;
  S.lastLog=t;
}
function curStreak(){const t=new Date().toLocaleDateString(),y=new Date(Date.now()-86400000).toLocaleDateString();return(S.lastLog===t||S.lastLog===y)?S.streak:0;}
function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({s:S,ch:CH,_v:2,_d:new Date().toISOString()},null,2)],{type:'application/json'}));
  a.download='big-lifts-'+new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}).replace(/\//g,'-')+'.json';
  a.click();S.lastBackup=Date.now();save();toast('Backup saved');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const dd=def(),raw=d.s||d;if(typeof raw!=='object'||raw===null||Array.isArray(raw))throw 0;S=Object.assign({},dd,raw);Object.keys(dd).forEach(k=>{if(S[k]===undefined||S[k]===null&&dd[k]!==null)S[k]=dd[k];});if(Array.isArray(d.ch))CH=d.ch;save();renderAll();toast('Data restored');}catch(err){alert('Invalid backup file');}};
    r.readAsText(f);};inp.click();
}
</script>
<script>
// WORKOUT LOGIC
let AW=null,woTick=null,restTick=null,restEnd=0;
const AWK='blt_aw';
function persistAW(){try{if(AW)localStorage.setItem(AWK,JSON.stringify(AW));else localStorage.removeItem(AWK);}catch(e){}}
function restoreAW(){try{const r=localStorage.getItem(AWK);if(!r)return;const a=JSON.parse(r);if(a&&a.t0&&Date.now()-a.t0<36000000)AW=a;else localStorage.removeItem(AWK);}catch(e){}}
function resumeAW(){if(!AW)return;push('workout');renderWorkout();startWoTimer();}
function discardAW(){if(!confirm('Discard this workout? Nothing will be logged.'))return;clearInterval(woTick);clearInterval(restTick);skipRest();AW=null;persistAW();if(stack[stack.length-1]==='workout')exitWorkout();renderToday();toast('Workout discarded');}
function exitWorkout(){if(stack.length>1)pop();else go('today');}
function startWorkout(id){
  const w=S.workouts.find(x=>x.id===id);if(!w)return;
  if(AW&&!confirm('A workout is in progress. Discard it and start a new one?'))return;
  AW={id:'s_'+Date.now(),name:w.name,exs:w.exercises.map(e=>({...e,plan:+e.sets||3,sets:[]})),t0:Date.now()};
  ensureAudio();persistAW();push('workout');renderWorkout();startWoTimer();
}
function startProgramDay(i){
  const d=S.program?.week?.[i];if(!d||!d.exercises?.length)return;
  if(AW&&!confirm('A workout is in progress. Discard it and start a new one?'))return;
  const DN=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  AW={id:'p_'+i+'_'+Date.now(),name:(S.program.name||'Program')+' — '+(d.focus||DN[i]),
      exs:d.exercises.map(e=>({...e,plan:+e.sets||3,sets:[]})),t0:Date.now(),progDay:i};
  ensureAudio();persistAW();push('workout');renderWorkout();startWoTimer();
}
function startWoTimer(){
  clearInterval(woTick);
  woTick=setInterval(()=>{
    const el=document.getElementById('wo-timer');if(!el||!AW)return;
    const s=Math.floor((Date.now()-AW.t0)/1000);
    const dn=AW.exs.reduce((n,e)=>n+e.sets.filter(x=>x?.done).length,0);
    const tt=AW.exs.reduce((n,e)=>n+Math.max(+e.plan||3,e.sets.length),0);
    el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0')+'  ·  '+dn+'/'+tt+' sets';
  },1000);
}
function completeSet(ei,si){
  if(!AW)return;
  ensureAudio();
  const ex=AW.exs[ei];
  const exType=getExType(ex);
  const wEl=document.getElementById('w_'+ei+'_'+si);
  const rEl=document.getElementById('r_'+ei+'_'+si);
  const wRaw=String(wEl?.value??'');
  const w=wRaw.trim()===''?NaN:parseFloat(wRaw);
  if(exType==='ddpy'){
    if(isNaN(w)||w<=0){toast('Enter duration (min)');return;}
    const intensity=rEl?.value||'medium';
    AW.exs[ei].sets[si]={w,r:intensity,routine:ex.routine||'',done:true};
    save();persistAW();renderWorkout();
    if(navigator.vibrate)try{navigator.vibrate(20);}catch(e){}
    toast('DDPY session logged – '+w+' min');
    return;
  }
  const r=parseFloat(rEl?.value)||0;
  if(exType==='strength'){
    if(isNaN(w)||w<0||!r){toast('Enter weight (0 for bodyweight) and reps');return;}
    AW.exs[ei].sets[si]={w,r,done:true};
    const key=ex.name.toLowerCase();
    let newPR=false;
    if(w>0&&(!S.prs[key]||w>S.prs[key].weight)){newPR=!!S.prs[key];S.prs[key]={name:ex.name,weight:w,reps:r,date:new Date().toLocaleDateString()};}
    save();persistAW();renderWorkout();
    if(newPR)toast('New PR — '+ex.name+' '+w+' lbs');
    if(navigator.vibrate)try{navigator.vibrate(20);}catch(e){}
    const rs=parseRest(ex.rest)||90;startRest(rs);
    return;
  }
  const labels={run:'miles and time (min)',bike:'miles and time (min)',swim:'laps and time (min)',heavybag:'rounds and min per round'};
  if(isNaN(w)||w<=0||!r){toast('Enter '+(labels[exType]||'distance and time'));return;}
  AW.exs[ei].sets[si]={w,r,done:true};
  save();persistAW();renderWorkout();
  if(navigator.vibrate)try{navigator.vibrate(20);}catch(e){}
  if(exType==='heavybag'){const rs=parseRest(ex.rest)||60;startRest(rs);}
}
function parseRest(s){if(!s)return 0;const p=String(s).split(':');return p.length===2?+p[0]*60+ +p[1]:+p[0]||0;}
function startRest(s){
  clearInterval(restTick);restEnd=Date.now()+s*1000;
  const bar=document.getElementById('rest-bar'),disp=document.getElementById('rest-display');
  if(bar)bar.classList.add('show');

// Returns a slice of CH that is always valid for the API: starts on a real
// user text turn (never an orphaned tool_result) and never ends on an
// unmatched tool_use. Prevents 400s once history grows past the window.
function apiHistory(max=40){
  let h=CH.slice(-max);
  const start=h.findIndex(m=>m.role==='user'&&typeof m.content==='string');
  h=start>0?h.slice(start):(start<0?h.slice(-1):h);
  while(h.length&&h[h.length-1].role==='assistant'&&Array.isArray(h[h.length-1].content)&&h[h.length-1].content.some(b=>b&&b.type==='tool_use'))h=h.slice(0,-1);
  // Merge consecutive same-role turns (possible after a mid-loop error) so
  // the API always sees strictly alternating roles.
  const out=[];const norm=c=>typeof c==='string'?[{type:'text',text:c}]:c;
  for(const m of h){const last=out[out.length-1];
    if(last&&last.role===m.role)last.content=norm(last.content).concat(norm(m.content));
    else out.push({role:m.role,content:m.content});}
  return out;
}

function fmtMsg(t){

  t=t.replace(/((?:^\d+\. .+\n?)+)/gm,m=>'<ol>'+m.replace(/^\d+\. (.+)$/gm,'<li>$1</li>')+'</ol>');

    .replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>')

  stack.length=0;stack.push(tab);
  ({today:renderToday,train:renderTrain,coach:renderCoach,nutrition:renderNutrition,stats:renderStats,me:renderMe})[tab]?.();
}
function push(screen){
  const cur=document.getElementById('s-'+stack[stack.length-1]);
  if(cur)cur.classList.add('behind');
  stack.push(screen);
  const next=document.getElementById('s-'+screen);
  if(next){next.classList.remove('behind');next.classList.add('active');}
  if(screen==='workout')document.getElementById('nav').style.display='none';
}
function pop(){
  if(stack.length<=1)return;
  const cur=document.getElementById('s-'+stack.pop());
  cur?.classList.remove('active','behind');
  const prev=document.getElementById('s-'+stack[stack.length-1]);
  if(prev){prev.classList.remove('behind');prev.classList.add('active');}
  document.getElementById('nav').style.display='';
}

function getExType(ex){
  const t=ex.type||'';
  if(['run','bike','swim','heavybag','ddpy'].includes(t))return t;
  if(ex.cardio||t==='cardio'){
    if(/(run|jog|treadmill)/i.test(ex.name))return 'run';
    if(/swim/i.test(ex.name))return 'swim';
    if(/(bag|boxing|muay)/i.test(ex.name))return 'heavybag';
    if(/(ddpy|ddp)/i.test(ex.name))return 'ddpy';
    return 'bike';
  }
  if(/(^run|running|jog)/i.test(ex.name))return 'run';
  if(/(bike|cycl|ride|spin)/i.test(ex.name))return 'bike';
  if(/swim/i.test(ex.name))return 'swim';
  if(/(heavy.?bag|bag work|boxing|muay)/i.test(ex.name))return 'heavybag';
  if(/(ddpy|ddp.?yoga)/i.test(ex.name))return 'ddpy';
  if(/(treadmill|elliptical|row|walk)/i.test(ex.name))return 'run';
  return 'strength';
}

function drawWtChart(canvas,data){
  if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,pad=10;
  const vals=data.map(d=>d.weight);
  const mn=Math.min(...vals)-3,mx=Math.max(...vals)+3;
  ctx.clearRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let i=0;i<3;i++){const y=pad+i*(H-pad*2)/2;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();}
  // Fill
  const xOf=i=>pad+i/(data.length-1)*(W-pad*2);
  const yOf=v=>H-pad-(v-mn)/(mx-mn)*(H-pad*2);
  ctx.beginPath();
  data.forEach((d,i)=>i===0?ctx.moveTo(xOf(i),yOf(d.weight)):ctx.lineTo(xOf(i),yOf(d.weight)));
  ctx.lineTo(xOf(data.length-1),H-pad);ctx.lineTo(xOf(0),H-pad);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fill();
  // Line
  ctx.beginPath();
  data.forEach((d,i)=>i===0?ctx.moveTo(xOf(i),yOf(d.weight)):ctx.lineTo(xOf(i),yOf(d.weight)));
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke();
  // End dots
  [[0,data[0].weight],[data.length-1,data[data.length-1].weight]].forEach(([i,v])=>{
    ctx.beginPath();ctx.arc(xOf(i),yOf(v),3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
  });
}

    const isRun=exType==='run';
    const isStr=exType==='strength';
    const u1=exType==='swim'?'laps':isStr?'lbs':'mi';
    const u2=isStr?'reps':'min';
    const h1=isDDPY?'Duration':exType==='swim'?'Laps':isStr?'Weight':'Miles';

      if(isStr&&st.w&&st.r)extra=Math.round(st.w*(1+st.r/30))+' e1RM';
      else if(isRun&&st.w&&st.r){const pm=Math.floor(st.r/st.w),ps=Math.round((st.r/st.w-pm)*60);extra=pm+':'+ps.toString().padStart(2,'0')+'/mi';}
      return`<div style="display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);">
        <div style="width:28px;height:28px;border-radius:7px;background:rgba(48,209,88,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green);flex-shrink:0;">${i+1}</div>

        <div style="width:60px;text-align:right;font-size:11px;color:var(--text3);">${extra}</div>
      </div>`;
    }).join('');
    const best=isStr?doneSets.reduce((b,s)=>(!b||s.w>b.w)?s:b,null):null;

    const wasPR=pr&&best&&best.w>=pr.weight?'<span style="font-size:10px;font-weight:700;color:var(--yellow);margin-left:6px;letter-spacing:.3px;">PR</span>':'';

    return`<div class="section" style="margin-top:16px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;">${esc(ex.name)}${wasPR}${typeTag}</div>
      <div class="card" style="padding:0 14px;">
        <div style="display:flex;padding:7px 0;border-bottom:1px solid var(--border);">

        </div>
        ${rows}
      </div>
    </div>`;
  }).join('');

function getTodayWaterOz(){
  const t=new Date().toLocaleDateString();
  if(!S.water||S.water.date!==t){S.water={date:t,oz:0};}
  return S.water.oz;
}
function addWater(oz){
  const t=new Date().toLocaleDateString();
  if(!S.water||S.water.date!==t)S.water={date:t,oz:0};
  const before=S.water.oz||0,goal=S.waterGoal||64;
  S.water.oz=Math.min(before+oz,320);
  save();renderToday();
  toast(before<goal&&S.water.oz>=goal?'💧 Hydration goal hit!':`+${oz}oz — keep hydrating!`);
}
function resetWater(){
  if(!confirm('Reset today\'s water to 0?'))return;
  const t=new Date().toLocaleDateString();
  S.water={date:t,oz:0};save();renderToday();
}

function getTodayMacros(){
  const t=new Date().toLocaleDateString();
  return(S.meals||[]).filter(m=>m.date===t).reduce((a,m)=>({cals:a.cals+(m.cals||0),protein:a.protein+(m.protein||0),carbs:a.carbs+(m.carbs||0),fat:a.fat+(m.fat||0)}),{cals:0,protein:0,carbs:0,fat:0});

function getTodayMeals(){
  const t=new Date().toLocaleDateString();return(S.meals||[]).filter(m=>m.date===t);

function addMealEntry(meal){

  S.meals.unshift({id:'m_'+Date.now(),date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),...meal});

// token match with light plural stemming ("eggs" matches "egg")
function tokHit(txt,t){return txt.includes(t)||(t.endsWith('s')&&txt.includes(t.slice(0,-1)));}
function matchCommon(toks){return COMMON_FOODS.concat(FAST_FOODS).filter(f=>{const txt=(f.product_name+' '+f.tags).toLowerCase();return toks.every(t=>tokHit(txt,t));});}
// Normalize API products: kJ→kcal when kcal missing, brands array→string
function normFood(p){
  const n=p.nutriments||{};
  if(!n['energy-kcal_100g']){const kj=n['energy-kj_100g']||n['energy_100g'];if(kj)n['energy-kcal_100g']=Math.round(kj/4.184);}
  if(Array.isArray(p.brands))p.brands=p.brands.join(', ');
  p.nutriments=n;return p;
}
// Rank API hits: name-token matches first, products with real data first,
// drop zero-relevance noise (mayonnaise-for-"eggs") when better hits exist
function rankFood(items,ql,toks){
  const scored=items.map((p,i)=>{
    const n=String(p.product_name||'').toLowerCase();
    const b=(Array.isArray(p.brands)?p.brands.join(' '):String(p.brands||'')).toLowerCase();
    // relevance = query tokens actually found in name or brand
    let tok=toks.filter(t=>tokHit(n,t)||tokHit(b,t)).length*10;
    if(n===ql)tok+=60;else if(n.startsWith(ql))tok+=25;else if(n.includes(ql))tok+=15;
    // data quality is only a tiebreaker, never relevance
    const nu=p.nutriments||{};
    let bonus=0;
    if(nu['energy-kcal_100g']||nu['energy-kj_100g']||nu['energy_100g'])bonus+=12;
    if(nu['proteins_100g']!=null)bonus+=4;
    return{p,tok,s:tok+bonus-i*0.01};
  });
  const relevant=scored.filter(x=>x.tok>0);
  return(relevant.length?relevant:scored).sort((a,b)=>b.s-a.s).map(x=>x.p);
}

async function fetchJSON(url,ms){
  const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});return await r.json();}finally{clearTimeout(t);}
}
async function doFoodSearch(){
  const q=document.getElementById('food-q')?.value?.trim();if(!q)return;
  const res=document.getElementById('food-results');
  const seq=++_searchSeq;
  const ql=q.toLowerCase(),toks=ql.split(/\s+/).filter(Boolean);
  // Staples match instantly — no network needed for the common stuff
  const local=matchCommon(toks);
  if(local.length)showFoodResults(local.slice());
  else res.innerHTML='<div style="padding:20px;text-align:center;color:var(--text2);">Searching…</div>';
  // Primary: current OFF search service. (The legacy cgi/search.pl endpoint
  // now hangs for minutes — it is fallback only, with a hard timeout.)
  let hits=null;
  try{
    const d=await fetchJSON(`https://search.openfoodfacts.org/search?q=${encodeURIComponent(q)}&page_size=20&fields=product_name,nutriments,brands,serving_size`,8000);
    if(d&&Array.isArray(d.hits))hits=d.hits;
  }catch(e){}
  if(!hits){
    try{
      const d=await fetchJSON(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=20&fields=product_name,nutriments,brands,serving_size`,10000);
      if(d&&Array.isArray(d.products))hits=d.products;
    }catch(e){}
  }
  if(seq!==_searchSeq)return; // a newer search superseded this one
  if(hits)showFoodResults(local.concat(rankFood(hits,ql,toks)).slice(0,30));
  else if(!local.length)res.innerHTML='<div style="padding:20px;text-align:center;color:var(--text2);">Database isn\'t responding right now. Log the food manually below — it takes 10 seconds.</div>';
}

// ─── BARCODE SCANNER ──────────────────────────────────────────────────
let _scanStream=null,_scanActive=false;
async function startBarcodeScanner(){
  if(!('BarcodeDetector' in window)){const c=prompt('Barcode scanner not supported on this browser.\nEnter barcode number manually:');if(c?.trim())lookupBarcode(c.trim());return;}
  try{
    const detector=new BarcodeDetector({formats:['ean_13','upc_a','upc_e','ean_8','code_128']});
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}});
    _scanStream=stream;_scanActive=true;
    const video=document.getElementById('scanner-video');
    const overlay=document.getElementById('scanner-overlay');
    if(!video||!overlay){stopBarcodeScanner();return;}
    video.srcObject=stream;
    overlay.style.display='flex';
    const loop=async()=>{
      if(!_scanActive)return;
      try{const codes=await detector.detect(video);if(codes.length){stopBarcodeScanner();lookupBarcode(codes[0].rawValue);return;}}catch(e){}
      requestAnimationFrame(loop);
    };
    video.onloadedmetadata=()=>{video.play();requestAnimationFrame(loop);};
  }catch(e){toast('Camera access denied. Grant camera permission and try again.');}
}
function stopBarcodeScanner(){
  _scanActive=false;
  if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}
  const overlay=document.getElementById('scanner-overlay');
  if(overlay)overlay.style.display='none';
}

    </div>

// ─── ICON GENERATOR — pixel art character (waist-up) + "BIG LIFTS"
function genIcon(size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  // Dark rounded background
  const rad=size*0.22;
  ctx.fillStyle='#0c0c0e';
  ctx.beginPath();ctx.moveTo(rad,0);ctx.lineTo(size-rad,0);
  ctx.arc(size-rad,rad,rad,-Math.PI/2,0);ctx.lineTo(size,size-rad);
  ctx.arc(size-rad,size-rad,rad,0,Math.PI/2);ctx.lineTo(rad,size);
  ctx.arc(rad,size-rad,rad,Math.PI/2,Math.PI);ctx.lineTo(0,rad);
  ctx.arc(rad,rad,rad,Math.PI,-Math.PI/2);ctx.closePath();ctx.fill();
  // Waist-up pixel character (same framing as before), scaled large to fill the tile (no text)
  const CROP=33,COLS=48;
  const CELL=Math.max(2,Math.floor(size*1.25/COLS));
  const charW=COLS*CELL,charH=CROP*CELL;
  const xOff=Math.floor((size-charW)/2);
  const yOff=Math.floor((size-charH)/2);
  // Stage 0 skin (level 1 appearance)
  const skinPal=getSkinPal(0);
  const rp={...PAL,k:skinPal.k,S:skinPal.S,s:skinPal.s};
  for(let row=0;row<CROP;row++){
    const line=BASE_SPRITE[row]||'';
    for(let col=0;col<COLS;col++){
      const color=rp[line[col]||'.'];
      if(color){ctx.fillStyle=color;ctx.fillRect(xOff+col*CELL,yOff+row*CELL,CELL,CELL);}
    }
  }
  return c.toDataURL('image/png');
}
